<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>rss boxes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('serve_favicon_svg') }}">
    <link rel="alternate icon" href="{{ url_for('serve_favicon') }}">
    <link rel="stylesheet" type="text/css" href="/static/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
  </head>
  <body>
    <header class="masthead">
      <div class="masthead-desktop">BOXED NEWS NOW</div>
      <div class="masthead-mobile">BOXED NEWS NOW</div>
    </header>

    <main class="page">
      <section class="toolbar" aria-label="Dashboard controls">
        <div class="toolbar-group" role="group" aria-label="Primary dashboard actions">
          <button id="toggle-customize" class="btn btn-primary" type="button">Customize</button>
          <button id="refresh-visible" class="btn" type="button">Refresh Visible</button>
          <button id="restore-defaults" class="btn btn-danger btn-soft-danger" type="button">Restore Defaults</button>
        </div>
        <p id="last-updated" class="last-updated" aria-live="polite">Last updated: never</p>
      </section>

      <section class="stonks-widget" aria-label="Market snapshot">
        <div class="tv-widget-wrap">
          <script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-market-summary.js"></script>
          <tv-market-summary
            symbol-sectors='[{"sectionName":"Markets","symbols":["COINBASE:BTCUSD","FRED:VIXCLS","AMEX:SPY","AMEX:GLD"]}]'
            item-size="compact"
            mode="custom">
          </tv-market-summary>
          <p id="stonks-fallback" class="stonks-fallback hidden">
            Market widget unavailable. If you use a strict content blocker, allow `widgets.tradingview-widget.com`.
          </p>
        </div>
      </section>

      <section id="customize-panel" class="customize-panel hidden" aria-label="Customize feed dashboard">
        <h2>Customize Dashboard</h2>
        <form id="add-feed-form" class="add-feed-form">
          <label for="feed-url-input">Add custom RSS feed URL</label>
          <input id="feed-url-input" type="url" placeholder="https://example.com/rss.xml" required>
          <label for="feed-label-input">Optional label</label>
          <input id="feed-label-input" type="text" maxlength="80" placeholder="My feed">
          <button class="btn btn-primary" type="submit">Add Feed</button>
          <p id="add-feed-error" class="form-error hidden"></p>
        </form>

        <div class="customize-groups">
          <div class="customize-group">
            <h3>Default feeds</h3>
            <ul id="default-feed-list" class="feed-toggle-list"></ul>
          </div>
          <div class="customize-group">
            <h3>Custom feeds</h3>
            <ul id="custom-feed-list" class="feed-toggle-list"></ul>
          </div>
        </div>
      </section>

      <section id="feed-grid" class="feed-grid" aria-live="polite"></section>
    </main>

    <footer class="footer">
      <a href="https://github.com/semiformal-net/rssboxes" target="_blank" rel="noopener noreferrer">semiformal / github</a>
    </footer>

<script>
(() => {
  const STORAGE_KEY = "rssboxes.dashboard.v2";
  const FEED_CACHE_KEY = "rssboxes.feedcache.v1";
  const FEED_CACHE_TTL_MS = 10 * 60 * 1000;
  const EMPTY_PREFS = { order: [], hiddenDefaultIds: [], customFeeds: [], updatedAt: new Date().toISOString() };

  const state = {
    defaults: [],
    prefs: { ...EMPTY_PREFS },
    cards: new Map(),
    feedTitles: {},
    refreshRun: 0,
    feedCache: {},
  };

  const el = {
    grid: document.getElementById("feed-grid"),
    toggleCustomize: document.getElementById("toggle-customize"),
    refreshVisible: document.getElementById("refresh-visible"),
    restoreDefaults: document.getElementById("restore-defaults"),
    lastUpdated: document.getElementById("last-updated"),
    customizePanel: document.getElementById("customize-panel"),
    defaultFeedList: document.getElementById("default-feed-list"),
    customFeedList: document.getElementById("custom-feed-list"),
    addFeedForm: document.getElementById("add-feed-form"),
    addFeedError: document.getElementById("add-feed-error"),
    feedUrlInput: document.getElementById("feed-url-input"),
    feedLabelInput: document.getElementById("feed-label-input"),
    stonksFallback: document.getElementById("stonks-fallback"),
  };

  function loadPrefs() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return { ...EMPTY_PREFS };
      const parsed = JSON.parse(raw);
      return {
        order: Array.isArray(parsed.order) ? parsed.order : [],
        hiddenDefaultIds: Array.isArray(parsed.hiddenDefaultIds) ? parsed.hiddenDefaultIds : [],
        customFeeds: Array.isArray(parsed.customFeeds) ? parsed.customFeeds : [],
        updatedAt: typeof parsed.updatedAt === "string" ? parsed.updatedAt : new Date().toISOString(),
      };
    } catch (_) {
      return { ...EMPTY_PREFS };
    }
  }

  function savePrefs() {
    state.prefs.updatedAt = new Date().toISOString();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.prefs));
  }

  function loadFeedCache() {
    try {
      const raw = localStorage.getItem(FEED_CACHE_KEY);
      if (!raw) return {};
      const parsed = JSON.parse(raw);
      return parsed && typeof parsed === "object" ? parsed : {};
    } catch (_) {
      return {};
    }
  }

  function saveFeedCache() {
    localStorage.setItem(FEED_CACHE_KEY, JSON.stringify(state.feedCache));
  }

  function feedCacheKey(feed) {
    if (feed.type === "default") return "default:" + feed.index;
    return "custom:" + (feed.id || feed.sourceUrl);
  }

  function getCachedPayload(feed) {
    const entry = state.feedCache[feedCacheKey(feed)];
    if (!entry) return null;
    if (!entry.cachedAt || !entry.payload) return null;
    if ((Date.now() - entry.cachedAt) > FEED_CACHE_TTL_MS) return null;
    return entry.payload;
  }

  function setCachedPayload(feed, payload) {
    if (!payload || !payload.success) return;
    state.feedCache[feedCacheKey(feed)] = {
      cachedAt: Date.now(),
      payload,
    };
    saveFeedCache();
  }

  function clearCachedPayload(feed) {
    delete state.feedCache[feedCacheKey(feed)];
    saveFeedCache();
  }

  function pruneFeedCache() {
    const valid = new Set(getAllFeeds().map((feed) => feedCacheKey(feed)));
    for (const key of Object.keys(state.feedCache)) {
      const entry = state.feedCache[key];
      const stale = !entry || !entry.cachedAt || (Date.now() - entry.cachedAt) > FEED_CACHE_TTL_MS;
      if (!valid.has(key) || stale) {
        delete state.feedCache[key];
      }
    }
    saveFeedCache();
  }

  function sourceLabel(feed) {
    if (feed.type === "custom" && feed.label) return feed.label;
    const host = parseHost(feed.sourceUrl);
    return host || feed.sourceUrl;
  }

  function listLabel(feed) {
    if (feed.type === "custom" && feed.label) return feed.label;
    if (feed.displayName) return feed.displayName;
    if (state.feedTitles[feed.id]) return state.feedTitles[feed.id];
    return feed.sourceUrl;
  }

  function feedIdFromIndex(index) {
    return "default:" + index;
  }

  function parseHost(url) {
    try {
      return new URL(url).hostname;
    } catch (_) {
      return "";
    }
  }

  function faviconUrl(url) {
    const host = parseHost(url);
    return host ? ("https://www.google.com/s2/favicons?sz=64&domain=" + encodeURIComponent(host)) : "";
  }

  async function apiGet(path) {
    const res = await fetch(path, { credentials: "same-origin" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.json();
  }

  async function apiPost(path, payload) {
    const res = await fetch(path, {
      method: "POST",
      credentials: "same-origin",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    const data = await res.json().catch(() => ({ success: false, error: "Bad server response" }));
    if (!res.ok && !data.error) data.error = "HTTP " + res.status;
    return { ok: res.ok, data };
  }

  function getAllFeeds() {
    const defaults = state.defaults.map((feed) => ({ ...feed, type: "default" }));
    const customs = state.prefs.customFeeds.map((feed) => ({ ...feed, type: "custom" }));
    return [...defaults, ...customs];
  }

  function isHidden(feed) {
    return feed.type === "default" && state.prefs.hiddenDefaultIds.includes(feed.id);
  }

  function visibleFeedsInOrder() {
    const all = new Map();
    getAllFeeds().forEach((feed) => all.set(feed.id, feed));

    const order = [];
    state.prefs.order.forEach((id) => {
      if (all.has(id)) {
        const feed = all.get(id);
        if (!isHidden(feed)) order.push(feed);
        all.delete(id);
      }
    });

    Array.from(all.values()).forEach((feed) => {
      if (!isHidden(feed)) order.push(feed);
    });

    return order;
  }

  function normalizeOrder() {
    const validIds = new Set(getAllFeeds().map((feed) => feed.id));
    const next = [];
    state.prefs.order.forEach((id) => {
      if (validIds.has(id) && !next.includes(id)) next.push(id);
    });
    Array.from(validIds).forEach((id) => {
      if (!next.includes(id)) next.push(id);
    });
    state.prefs.order = next;
  }

  function createCardSkeleton(feed) {
    const card = document.createElement("article");
    card.className = "feed-card loading";
    card.classList.add(cardAccentClass(feed.id));
    card.dataset.feedId = feed.id;
    const head = document.createElement("div");
    head.className = "feed-card-head";

    const sourceChip = document.createElement("div");
    sourceChip.className = "source-chip";
    const faviconWrap = document.createElement("span");
    faviconWrap.className = "favicon-wrap";
    const favicon = document.createElement("img");
    favicon.src = faviconUrl(feed.sourceUrl);
    favicon.alt = "";
    favicon.loading = "lazy";
    favicon.addEventListener("error", () => {
      favicon.style.display = "none";
    });
    faviconWrap.appendChild(favicon);
    const title = document.createElement("h3");
    title.className = "feed-title";
    title.textContent = "Loading...";
    title.title = sourceLabel(feed);
    sourceChip.appendChild(faviconWrap);
    sourceChip.appendChild(title);

    const cardActions = document.createElement("div");
    cardActions.className = "card-actions";
    const actions = [
      ["move-up", "Move feed up", "↑"],
      ["move-down", "Move feed down", "↓"],
      ["refresh", "Refresh feed", "↻"],
    ];
    actions.forEach(([action, label, symbol]) => {
      const btn = document.createElement("button");
      btn.className = "icon-btn";
      btn.dataset.action = action;
      btn.setAttribute("aria-label", label);
      btn.title = label;
      btn.textContent = symbol;
      cardActions.appendChild(btn);
    });
    head.appendChild(sourceChip);
    head.appendChild(cardActions);

    const list = document.createElement("ul");
    list.className = "item-list skeleton-list";
    for (let i = 0; i < 5; i++) {
      list.appendChild(document.createElement("li"));
    }

    card.appendChild(head);
    card.appendChild(list);
    return card;
  }

  function renderCardContent(card, payload, feed) {
    if (!payload.success) {
      card.classList.remove("loading");
      card.querySelector(".feed-title").textContent = "Unable to load feed";
      const listEl = card.querySelector(".item-list");
      listEl.innerHTML = "";
      const errorLi = document.createElement("li");
      errorLi.className = "error-row";
      errorLi.textContent = payload.error || "Unknown error";
      listEl.appendChild(errorLi);
      return;
    }

    const titleEl = card.querySelector(".feed-title");
    const listEl = card.querySelector(".item-list");

    titleEl.textContent = payload.title || "Untitled Feed";
    titleEl.title = sourceLabel(feed);
    if (payload.title) {
      const old = state.feedTitles[feed.id];
      state.feedTitles[feed.id] = payload.title;
      if (old !== payload.title && !el.customizePanel.classList.contains("hidden")) {
        renderFeedLists();
      }
    }
    listEl.classList.remove("skeleton-list");
    listEl.innerHTML = "";

    payload.feed_items.forEach((item) => {
      const li = document.createElement("li");
      li.className = "item-row";
      const link = document.createElement("a");
      link.href = item.url || "#";
      link.target = "_blank";
      link.rel = "noopener noreferrer";
      link.textContent = item.title || "Untitled";

      const summary = document.createElement("p");
      summary.textContent = item.summary || "";

      li.appendChild(link);
      li.appendChild(summary);
      listEl.appendChild(li);
    });
    card.classList.remove("loading");
  }

  async function fetchFeedFor(feed, card, options = {}) {
    const force = Boolean(options.force);
    if (!force) {
      const cached = getCachedPayload(feed);
      if (cached) {
        renderCardContent(card, cached, feed);
        return { fromCache: true };
      }
    }

    const feedRef = feed.type === "default"
      ? { type: "default", index: feed.index }
      : { type: "url", url: feed.sourceUrl };

    const response = await apiPost("/api/v1/feeds/fetch", { feedRef });
    const payload = response.data || { success: false, error: "No response" };
    renderCardContent(card, payload, feed);
    if (payload.success) {
      setCachedPayload(feed, payload);
    }
    return { fromCache: false };
  }

  function cardAccentClass(feedId) {
    let hash = 0;
    for (let i = 0; i < feedId.length; i++) {
      hash = ((hash << 5) - hash) + feedId.charCodeAt(i);
      hash |= 0;
    }
    const variants = ["accent-a", "accent-b", "accent-c", "accent-d"];
    return variants[Math.abs(hash) % variants.length];
  }

  function formatTime(date) {
    return date.toLocaleTimeString([], { hour: "numeric", minute: "2-digit", second: "2-digit" });
  }

  async function renderGridAndFetch(options = {}) {
    const forceRefresh = Boolean(options.forceRefresh);
    const runId = ++state.refreshRun;
    el.lastUpdated.textContent = "Last updated: updating...";
    state.cards.clear();
    el.grid.innerHTML = "";
    const feeds = visibleFeedsInOrder();

    feeds.forEach((feed) => {
      const card = createCardSkeleton(feed);
      state.cards.set(feed.id, { feed, card });
      el.grid.appendChild(card);
    });

    await Promise.all(feeds.map(async (feed) => {
      const info = state.cards.get(feed.id);
      if (!info) return;
      try {
        await fetchFeedFor(feed, info.card, { force: forceRefresh });
      } catch (_) {
        renderCardContent(info.card, { success: false, error: "Network error" }, feed);
      }
    }));

    if (runId === state.refreshRun) {
      el.lastUpdated.textContent = "Last updated: " + formatTime(new Date());
    }
  }

  function moveFeed(feedId, delta) {
    normalizeOrder();
    const idx = state.prefs.order.indexOf(feedId);
    if (idx === -1) return;
    const target = idx + delta;
    if (target < 0 || target >= state.prefs.order.length) return;
    const clone = state.prefs.order.slice();
    const [item] = clone.splice(idx, 1);
    clone.splice(target, 0, item);
    state.prefs.order = clone;
    savePrefs();
    renderGridAndFetch({ forceRefresh: false });
  }

  function toggleDefaultHidden(feedId, hidden) {
    const set = new Set(state.prefs.hiddenDefaultIds);
    if (hidden) set.add(feedId);
    else set.delete(feedId);
    state.prefs.hiddenDefaultIds = Array.from(set);
    savePrefs();
    normalizeOrder();
    renderFeedLists();
    renderGridAndFetch({ forceRefresh: false });
  }

  function removeCustomFeed(feedId) {
    state.prefs.customFeeds = state.prefs.customFeeds.filter((f) => f.id !== feedId);
    state.prefs.order = state.prefs.order.filter((id) => id !== feedId);
    savePrefs();
    clearCachedPayload({ type: "custom", id: feedId });
    pruneFeedCache();
    normalizeOrder();
    renderFeedLists();
    renderGridAndFetch({ forceRefresh: false });
  }

  async function addCustomFeed(url, label) {
    const trimmed = url.trim();
    const test = await apiPost("/api/v1/feeds/fetch", { feedRef: { type: "url", url: trimmed } });
    if (!test.data || !test.data.success) {
      throw new Error(test.data?.error || "Could not validate feed");
    }

    const feedId = "custom:" + crypto.randomUUID();
    state.prefs.customFeeds.push({
      id: feedId,
      url: trimmed,
      sourceUrl: trimmed,
      label: label.trim() || null,
    });
    state.prefs.order.push(feedId);
    savePrefs();
    pruneFeedCache();
    normalizeOrder();
    renderFeedLists();
    renderGridAndFetch({ forceRefresh: false });
  }

  function renderFeedLists() {
    el.defaultFeedList.innerHTML = "";
    el.customFeedList.innerHTML = "";

    state.defaults.forEach((feed) => {
      const li = document.createElement("li");
      const hidden = state.prefs.hiddenDefaultIds.includes(feed.id);
      const label = document.createElement("label");
      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.checked = !hidden;
      checkbox.dataset.feedId = feed.id;
      const span = document.createElement("span");
      span.textContent = listLabel(feed);
      label.appendChild(checkbox);
      label.appendChild(span);
      li.appendChild(label);
      checkbox.addEventListener("change", () => toggleDefaultHidden(feed.id, !checkbox.checked));
      el.defaultFeedList.appendChild(li);
    });

    if (!state.prefs.customFeeds.length) {
      const empty = document.createElement("li");
      empty.className = "muted";
      empty.textContent = "No custom feeds yet.";
      el.customFeedList.appendChild(empty);
      return;
    }

    state.prefs.customFeeds.forEach((feed) => {
      const li = document.createElement("li");
      const row = document.createElement("div");
      row.className = "custom-feed-row";
      const text = document.createElement("span");
      text.textContent = listLabel({ ...feed, type: "custom", sourceUrl: feed.sourceUrl || feed.url });
      const removeBtn = document.createElement("button");
      removeBtn.className = "btn btn-small btn-danger";
      removeBtn.type = "button";
      removeBtn.textContent = "Remove";
      removeBtn.addEventListener("click", () => removeCustomFeed(feed.id));
      row.appendChild(text);
      row.appendChild(removeBtn);
      li.appendChild(row);
      el.customFeedList.appendChild(li);
    });
  }

  function restoreDefaults() {
    state.prefs = { ...EMPTY_PREFS };
    savePrefs();
    state.feedCache = {};
    saveFeedCache();
    normalizeOrder();
    renderFeedLists();
    renderGridAndFetch({ forceRefresh: true });
  }

  function bindEvents() {
    el.toggleCustomize.addEventListener("click", () => {
      const willOpen = el.customizePanel.classList.contains("hidden");
      el.customizePanel.classList.toggle("hidden");
      if (willOpen) {
        renderFeedLists();
      }
    });

    el.refreshVisible.addEventListener("click", () => {
      renderGridAndFetch({ forceRefresh: true });
    });

    el.restoreDefaults.addEventListener("click", restoreDefaults);

    el.addFeedForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      el.addFeedError.textContent = "";
      el.addFeedError.classList.add("hidden");
      try {
        await addCustomFeed(el.feedUrlInput.value, el.feedLabelInput.value);
        el.addFeedForm.reset();
      } catch (error) {
        el.addFeedError.textContent = error.message || "Could not add feed";
        el.addFeedError.classList.remove("hidden");
      }
    });

    el.grid.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const card = event.target.closest(".feed-card");
      if (!card) return;
      const feedId = card.dataset.feedId;
      const info = state.cards.get(feedId);
      if (!info) return;

      const action = button.dataset.action;
      if (action === "move-up") moveFeed(feedId, -1);
      if (action === "move-down") moveFeed(feedId, 1);
      if (action === "refresh") {
        card.classList.add("loading");
        fetchFeedFor(info.feed, card, { force: true });
      }
    });
  }

  async function init() {
    state.prefs = loadPrefs();
    state.feedCache = loadFeedCache();
    try {
      const defaults = await apiGet("/api/v1/feeds/default");
      state.defaults = defaults.map((feed) => ({
        ...feed,
        id: feed.id || feedIdFromIndex(feed.index),
        sourceUrl: feed.sourceUrl,
      }));
    } catch (_) {
      state.defaults = [];
    }
    pruneFeedCache();
    normalizeOrder();
    renderFeedLists();
    bindEvents();
    renderGridAndFetch({ forceRefresh: false });
    setTimeout(() => {
      if (!customElements.get("tv-market-summary") && el.stonksFallback) {
        el.stonksFallback.classList.remove("hidden");
      }
    }, 3500);
  }

  init();
})();
</script>
  </body>
</html>
